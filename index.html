<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PayZo</title>

<style>
:root{--radius:16px;}
*{-webkit-tap-highlight-color: transparent;outline:none;user-select:text;box-sizing:border-box;}
body{margin:0;font-family:system-ui;background:#f5f6fa;}
.header{margin:12px;padding:14px;background:#fff;border-radius:var(--radius);display:flex;gap:12px;align-items:center;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
.logo{width:45px;height:45px;border-radius:12px;background:linear-gradient(135deg,#5b5cf0,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.title{font-weight:700;font-size:18px}
.subtitle{font-size:12px;color:#777}
.search{padding:10px 12px 0}
.search input{width:100%;padding:12px;border:none;border-radius:var(--radius);background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.tabs{display:flex;overflow:auto;padding:12px 12px 6px}
.tabs button{margin-right:8px;padding:8px 14px;border:none;border-radius:20px;background:#e5e7eb}
.filter{display:flex;padding:6px 12px 10px}
.filter button{margin-right:8px;padding:6px 12px;border:none;border-radius:20px;background:#e5e7eb}
.active{background:#111!important;color:#fff!important}
#offers{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
.card{background:#fff;padding:14px;border-radius:var(--radius);box-shadow:0 3px 10px rgba(0,0,0,0.05);cursor:pointer;transition:0.15s}
.card:active{transform:scale(0.97)}
.badge{font-size:11px;padding:4px 8px;border-radius:6px;color:#fff;display:inline-block;margin-bottom:8px}
.gp{background:#00aaff}.airtel{background:#ff0033}.bl{background:#ff8800}.robi{background:#ff3b30}.skitto{background:#ff2d8d}
.title2{font-weight:600;font-size:14px}
.info{font-size:12px;color:#777;margin-top:6px}
.price-box{margin-top:12px;padding:12px;background:#e5e7eb;border-radius:var(--radius);text-align:center;font-weight:700;font-size:15px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);display:none;justify-content:center;align-items:center}
.popup{background:#fff;width:90%;max-width:320px;padding:20px;border-radius:var(--radius);box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.popup input{width:100%;padding:12px;margin-top:14px;border-radius:16px;border:1px solid #e5e7eb;font-size:16px}
.btn{margin-top:14px;width:100%;padding:12px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#5b5cf0,#7c3aed);color:#fff;font-weight:600}
</style>
</head>

<body>

<div class="header">
<div class="logo">PZ</div>
<div>
<div class="title">PayZo</div>
<div class="subtitle">Secure Payment System</div>
</div>
</div>

<div class="search">
<input id="search" placeholder="সার্চ করুন..." onkeyup="render()">
</div>

<div class="tabs">
<button onclick="setSIM('gp',this)">GP</button>
<button onclick="setSIM('airtel',this)">Airtel</button>
<button onclick="setSIM('bl',this)">BL</button>
<button onclick="setSIM('robi',this)">Robi</button>
<button onclick="setSIM('skitto',this)">Skitto</button>
</div>

<div class="filter">
<button onclick="setType('ALL',this)">সব</button>
<button onclick="setType('MIN',this)">মিনিট</button>
<button onclick="setType('DATA',this)">জিবি</button>
<button onclick="setType('COMBO',this)">বান্ডেল</button>
</div>

<div id="offers"></div>

<div class="overlay" id="overlay">
<div class="popup">
<h3 id="pTitle"></h3>
<p id="pDetails"></p>
<div id="pPrice"></div>

<input id="phone" placeholder="01XXXXXXXXX" maxlength="11" oninput="validateNumber(this)">
<button class="btn" onclick="send()">Order</button>
</div>
</div>

<script>

let db={
 gp:"https://raw.githubusercontent.com/siyam-at-git/offers-data/main/Grameenphone.txt",
 airtel:"https://raw.githubusercontent.com/siyam-at-git/offers-data/main/Airtel.txt",
 bl:"https://raw.githubusercontent.com/siyam-at-git/offers-data/main/Banglalink.txt",
 robi:"https://raw.githubusercontent.com/siyam-at-git/offers-data/main/Robi.txt",
 skitto:"https://raw.githubusercontent.com/siyam-at-git/offers-data/main/Skitoo.txt"
};

let currentSIM = localStorage.getItem("sim") || "gp";
let currentType = localStorage.getItem("type") || "ALL";

let all=[],selectedOffer="";

function normalize(text){
 let bn="০১২৩৪৫৬৭৮৯", en="0123456789";
 text = text.split('').map(c=>{
  let i=bn.indexOf(c);
  return i>-1 ? en[i] : c;
 }).join('');
 return text.toLowerCase();
}

function generateOrderID(){
 return "PZ"+Math.floor(100000 + Math.random()*900000);
}

function formatPrice(n){
 return Number(n).toLocaleString("en-BD");
}

async function load(){
 let res=await fetch(db[currentSIM]+"?v="+Date.now());
 let text=await res.text();
 all=[];
 text.split("\n").forEach(l=>{
  if(l.includes("|")){
   let [title,validity,priceText]=l.split("|");
   let price=priceText.replace("টাকা","").trim();
   let hasMinute=title.includes("মিনিট");
   let hasData=title.includes("জিবি");
   let type="COMBO";
   if(hasMinute && !hasData) type="MIN";
   if(hasData && !hasMinute) type="DATA";
   all.push({title,validity,price,type});
  }
 });
 render();
}

function validateNumber(input){
 input.value=input.value.replace(/[^0-9]/g,'').slice(0,11);
}

function send(){
 let phone=document.getElementById("phone").value;
 if(phone.length!==11){
  alert("১১ সংখ্যার সঠিক নাম্বার দিন");
  return;
 }

 let parts = selectedOffer.split(" ");
 let rawPrice = parts.pop();

 let bn="০১২৩৪৫৬৭৮৯", en="0123456789";
 let price = rawPrice.split('').map(c=>{
  let i=bn.indexOf(c);
  return i>-1 ? en[i] : c;
 }).join('').replace(/[^\d]/g,'');

 let offer = parts.join(" ");

 let msg =
 "📦 PayZo অর্ডার রিকোয়েস্ট\n\n"+
 "🆔 Order ID: "+generateOrderID()+"\n"+
 "📱 অপারেটর: "+currentSIM.toUpperCase()+"\n"+
 "🎁 অফার: "+offer+"\n"+
 "💰 মূল্য: ৳"+formatPrice(price)+"\n"+
 "📅 মেয়াদ: ৩০ দিন\n"+
 "📞 নাম্বার: "+phone+"\n\n"+
 "✔️ অর্ডারটি নিশ্চিত করুন।";

 let url="https://t.me/siyam_at_telegram?text="+encodeURIComponent(msg);

 window.open(url,"_blank");
 setTimeout(()=>{window.location.href=url;},500);
}

function setSIM(s,btn){
 currentSIM=s;
 localStorage.setItem("sim",s);
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
 load();
}

function setType(t,btn){
 currentType=t;
 localStorage.setItem("type",t);
 document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
 render();
}

function render(){
 let search=normalize(document.getElementById("search").value);
 let html="";
 all.forEach(o=>{
  let hasMinute=o.title.includes("মিনিট");
  let hasData=o.title.includes("জিবি");
  let ok=false;
  if(currentType=="ALL") ok=true;
  if(currentType=="MIN" && hasMinute && !hasData) ok=true;
  if(currentType=="DATA" && hasData && !hasMinute) ok=true;
  if(currentType=="COMBO" && hasMinute && hasData) ok=true;

  let text=normalize(o.title+" "+o.price);

  if(ok && text.includes(search)){
   html+=`
   <div class="card" onclick="openPopup('${o.title}','${o.validity}','${o.price}')">
   <div class="badge ${currentSIM}">${currentSIM.toUpperCase()}</div>
   <div class="title2">${o.title}</div>
   <div class="info">Validity: ${o.validity}</div>
   <div class="price-box">৳${o.price}</div>
   </div>`;
  }
 });
 document.getElementById("offers").innerHTML=html;
}

function openPopup(t,v,p){
 selectedOffer=t+" "+p;
 document.getElementById("pTitle").innerText="📦 Offer Details";
 document.getElementById("pDetails").innerHTML=`
 <b>Operator:</b> ${currentSIM.toUpperCase()}<br><br>
 <b>Offer:</b> ${t}<br><br>
 <b>Validity:</b> ${v}
 `;
 document.getElementById("pPrice").innerHTML=`
 <div style="margin-top:10px;padding:10px;background:#f1f5f9;border-radius:16px;text-align:center">
 <div>Total Amount</div>
 <div style="font-size:18px;font-weight:700">৳${p}</div>
 </div>
 `;
 document.getElementById("overlay").style.display="flex";
}

document.getElementById("overlay").onclick=e=>{
 if(e.target.id=="overlay") e.target.style.display="none";
};

function init(){
 document.querySelectorAll(".tabs button").forEach(b=>{
  if(b.innerText.toLowerCase()==currentSIM) b.classList.add("active");
 });
 document.querySelectorAll(".filter button").forEach(b=>{
  let map={"সব":"ALL","মিনিট":"MIN","জিবি":"DATA","বান্ডেল":"COMBO"};
  if(map[b.innerText]==currentType) b.classList.add("active");
 });
 load();
}

init();

</script>

</body>
</html>
